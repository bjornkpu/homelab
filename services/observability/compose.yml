services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - /mnt/main/appdata/observability/loki:/loki
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    environment:
      - GF_SECURITY_ADMIN_EMAIL=${GRAFANA_EMAIL}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - /mnt/main/appdata/observability/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.punsvik.net`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.routers.grafana.middlewares=internal-only@file,security-headers@file"
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=3000"
    networks:
      - observability
      - traefik

  vector:
    image: timberio/vector:0.43.1-debian
    container_name: vector
    restart: unless-stopped
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability

networks:
  observability:
    driver: bridge
  traefik:
    external: true
