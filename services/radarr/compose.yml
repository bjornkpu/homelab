# Radarr - Movie management & automation
# https://github.com/linuxserver/docker-radarr
#
# Monitors movies, searches Prowlarr for releases,
# sends downloads to qBittorrent, renames and organizes files.

services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=568
      - PGID=568
      - TZ=Europe/Oslo
    volumes:
      - /mnt/main/appdata/radarr:/config
      - /mnt/main/media:/media
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.punsvik.net`)
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls.certresolver=le
      - traefik.http.routers.radarr.middlewares=internal-only@file,security-headers@file
      - traefik.http.services.radarr.loadbalancer.server.port=7878

networks:
  traefik:
    external: true
    name: traefik
