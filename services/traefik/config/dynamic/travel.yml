# Traefik Dynamic Configuration - AdventureLog frontend (TrueNAS App)
# Proxies travel.punsvik.net to container on port 3000

http:
  routers:
    travel:
      rule: "Host(`travel.punsvik.net`)"
      entryPoints:
        - websecure
      service: travel-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    travel-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://ix-adventurelog-frontend-1:3000"
