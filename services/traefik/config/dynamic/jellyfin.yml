# Traefik Dynamic Configuration - Jellyfin (TrueNAS App)
# Proxies jellyfin.punsvik.net to Jellyfin on port 8096

http:
  routers:
    jellyfin:
      rule: "Host(`jellyfin.punsvik.net`)"
      entryPoints:
        - websecure
      service: jellyfin-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers-no-frame@file

  services:
    jellyfin-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://ix-jellyfin-jellyfin-1:8096"
