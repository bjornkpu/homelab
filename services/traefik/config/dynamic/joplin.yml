http:
  routers:
    joplin:
      rule: "Host(`joplin.punsvik.net`)"
      entryPoints:
        - websecure
      service: joplin-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    joplin-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30106"
