# Traefik Dynamic Configuration - AdventureLog backend (TrueNAS App)
# Proxies travel-api.punsvik.net to container on port 80

http:
  routers:
    travel-api:
      rule: "Host(`travel-api.punsvik.net`)"
      entryPoints:
        - websecure
      service: travel-api-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    travel-api-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://ix-adventurelog-backend-1:80"
