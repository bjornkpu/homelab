http:
  routers:
    planka:
      rule: "Host(`planka.punsvik.net`)"
      entryPoints:
        - websecure
      service: planka-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    planka-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30034"
