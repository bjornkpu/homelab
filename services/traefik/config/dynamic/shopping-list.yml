# Traefik Dynamic Configuration - Shopping List (K8s Frontend)
# Proxies shopping-list.furuknappen.no to K8s ingress at 192.168.1.20:80

http:
  routers:
    shopping-list:
      rule: "Host(`shopping-list.furuknappen.no`)"
      entryPoints:
        - websecure
      service: shopping-list-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

    shopping-list-db:
      rule: "Host(`db.shopping-list.furuknappen.no`)"
      entryPoints:
        - websecure
      service: shopping-list-db-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    shopping-list-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.20:80"
    shopping-list-db-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.20:80"


