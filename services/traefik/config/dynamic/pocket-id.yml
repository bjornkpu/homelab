http:
  routers:
    pocket-id:
      rule: "Host(`auth.punsvik.net`)"
      entryPoints:
        - websecure
      service: pocket-id-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    pocket-id-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30218"
