http:
  routers:
    outline:
      rule: "Host(`outline.punsvik.net`)"
      entryPoints:
        - websecure
      service: outline-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    outline-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30144"
