# Traefik Dynamic Configuration - Outline (TrueNAS App)
# Routes via the shared `traefik` docker network directly to the container,
# instead of the host NodePort. Requires the Outline app to join the `traefik`
# network (Network Configuration -> Networks -> add `traefik`).

http:
  routers:
    outline:
      rule: "Host(`outline.punsvik.net`)"
      entryPoints:
        - websecure
      service: outline-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    outline-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://ix-outline-outline-1:30144"
