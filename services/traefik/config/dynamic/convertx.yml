http:
  routers:
    convertx:
      rule: "Host(`convertx.punsvik.net`)"
      entryPoints:
        - websecure
      service: convertx-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    convertx-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30154"
