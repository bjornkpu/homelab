# Traefik Dynamic Configuration - Deploy Webhook
# Internet-facing endpoint for GitHub Actions auto-deploy

http:
  routers:
    deploy-webhook:
      rule: "Host(`deploy.punsvik.net`)"
      entryPoints:
        - websecure
      service: deploy-webhook-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file
        - rate-limit@file

  services:
    deploy-webhook-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.4:9000"
