# Traefik Dynamic Configuration - ChangeDetection.io (TrueNAS App)
# Proxies changedetection.punsvik.net to container on port 30159

http:
  routers:
    change-detection:
      rule: "Host(`changedetection.punsvik.net`)"
      entryPoints:
        - websecure
      service: change-detection-svc
      tls:
        certResolver: le
      middlewares:
        - internal-only@file
        - security-headers@file

  services:
    change-detection-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://ix-change-detection-change-detection-1:30159"
