http:
  routers:
    kitchenowl:
      rule: "Host(`kitchenowl.punsvik.net`)"
      entryPoints:
        - websecure
      service: kitchenowl-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    kitchenowl-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30211"
