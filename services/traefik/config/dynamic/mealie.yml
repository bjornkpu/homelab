# Traefik Dynamic Configuration - Mealie (TrueNAS App)
# Proxies mealie.punsvik.net to TrueNAS app on port 30111

http:
  routers:
    mealie:
      rule: "Host(`mealie.punsvik.net`)"
      entryPoints:
        - websecure
      service: mealie-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    mealie-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30111"
