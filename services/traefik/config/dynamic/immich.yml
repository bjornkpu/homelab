# Traefik Dynamic Configuration - Immich (TrueNAS App)
# Proxies immich.punsvik.net to container on port 30041

http:
  routers:
    immich:
      rule: "Host(`immich.punsvik.net`)"
      entryPoints:
        - websecure
      service: immich-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    immich-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://ix-immich-server-1:30041"
