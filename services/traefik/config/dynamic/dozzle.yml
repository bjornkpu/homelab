http:
  routers:
    logs:
      rule: "Host(`logs.punsvik.net`)"
      entryPoints:
        - websecure
      service: logs-svc
      tls:
        certResolver: le
      middlewares:
        - internal-only@file
        - security-headers@file

  services:
    logs-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30064"
