http:
  routers:
    dozzle:
      rule: "Host(`dozzle.punsvik.net`)"
      entryPoints:
        - websecure
      service: dozzle-svc
      tls:
        certResolver: le
      middlewares:
        - internal-only@file
        - security-headers@file

  services:
    dozzle-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.4:30064"
