# Traefik Dynamic Configuration - Home Assistant (TrueNAS App)
# Proxies home.punsvik.net to HA container on traefik network

http:
  routers:
    home-assistant:
      rule: "Host(`home.punsvik.net`)"
      entryPoints:
        - websecure
      service: home-assistant-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file

  services:
    home-assistant-svc:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://ix-home-assistant-home-assistant-1:8123"
