# Traefik Dynamic Configuration - Obsidian Livesync via K8s
# Proxies obsidian.punsvik.net to K8s ingress at 192.168.1.20:443

http:
  routers:
    obsidian-livesync:
      rule: "Host(`obsidian.punsvik.net`)"
      entryPoints:
        - websecure
      service: obsidian-livesync-svc
      tls:
        certResolver: le
      middlewares:
        - security-headers@file
        
  services:
    obsidian-livesync-svc:
      loadBalancer:
        passHostHeader: true
        serversTransport: obsidian-sni
        servers:
          - url: "https://192.168.1.20:443"

  serversTransports:
    obsidian-sni:
      serverName: obsidian.punsvik.net

# Note: K8s ingress has proxy-body-size: 256m
# This is handled on the K8s side, Traefik just proxies through
