# Traefik Static Configuration
# This file requires container restart to apply changes

global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: le

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik
    defaultRule: "Host(`{{ normalize .Name }}.punsvik.net`)"

  file:
    directory: /etc/traefik/dynamic
    watch: true  # Auto-reload dynamic configs on file changes

certificatesResolvers:
  le:
    acme:
      email: bk.punsvik@gmail.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO
  filePath: /logs/traefik.log

accessLog:
  filePath: /logs/access.log
  filters:
    statusCodes:
      - "400-599"  # Only log errors