upstream:
  default:
    - 1.1.1.1
    - 1.0.0.1
    - 8.8.8.8
    - 8.8.4.4

customDNS:
  customTTL: 3600
  mapping:
    # punsvik
    "*.punsvik.net": 192.168.1.4
    punsvik.net: 192.168.1.4
    # furuknappen
    "*.furuknappen.no": 192.168.1.4
    furuknappen.no: 192.168.1.4
    # lan
    router.lan: 192.168.1.1
    nas.lan: 192.168.1.4

blocking:
  denylists:
    ads:
      - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
  clientGroupsBlock:
    default:
      - ads

ports:
  dns: 53
  http: 4000

# caching:
#   minTime: 5m
#   maxTime: 30m
#   prefetching: true

prometheus:
  enable: true
  path: /metrics

log:
  level: info
  format: text
  timestamp: true
