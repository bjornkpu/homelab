- id: '1744829172328'
  alias: Night on charging
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.bk_phone_charger_type
    to: wireless
  conditions:
  - condition: time
    after: '21:00:00'
    before: 01:30:00
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    - sun
  actions:
  - action: scene.turn_on
    metadata: {}
    data:
      transition: 5
    target:
      entity_id: scene.night_mode
  mode: single
- id: '1744833575546'
  alias: Evening
  description: ''
  triggers:
  - trigger: time
    at: '21:00:00'
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: device_tracker.camilla_sin_iphone
      state: home
    - condition: state
      entity_id: device_tracker.bk_phone
      state: home
  actions:
  - action: scene.turn_on
    metadata: {}
    data:
      transition: 20
    target:
      entity_id: scene.evning
  mode: single
- id: '1744833637322'
  alias: Day
  description: ''
  triggers:
  - trigger: time
    at: 09:00:00
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: device_tracker.bk_phone
      state: home
    - condition: state
      entity_id: device_tracker.camilla_sin_iphone
      state: home
  actions:
  - action: scene.turn_on
    metadata: {}
    data:
      transition: 20
    target:
      entity_id: scene.day
  mode: single
- id: '1744933122950'
  alias: Morning mode
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.bk_phone_charger_type
    to: none
  conditions:
  - condition: time
    after: 06:00:00
    before: 09:00:00
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    - sun
  actions:
  - action: scene.turn_on
    metadata: {}
    data:
      transition: 5
    target:
      entity_id: scene.morning
  mode: single
