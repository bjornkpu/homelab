---
# Homepage Widgets
# https://gethomepage.dev/configs/info-widgets/

- logo:
    icon: homepage.png

- greeting:
    text_size: 2xl
    text: Punsvik Homelab

- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short
      hour12: false

- openmeteo:
    label: Trondheim
    latitude: 63.43
    longitude: 10.39
    timezone: Europe/Oslo
    units: metric
    cache: 5

# - search:
#     provider: duckduckgo
#     target: _blank
#     focus: false

- resources:
    label: TrueNAS
    cpu: true
    memory: true
    cputemp: true
    uptime: true
    disk: /

