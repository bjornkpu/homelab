services:
  homepage:
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4096M
    environment:
      HOMEPAGE_ALLOWED_HOSTS: homepage.punsvik.net
      NVIDIA_VISIBLE_DEVICES: void
      PORT: "30054"
      TZ: Etc/UTC
      UMASK: "002"
      UMASK_SET: "002"
    group_add:
      - 568
      - 999
    healthcheck:
      interval: 30s
      retries: 5
      start_interval: 2s
      start_period: 15s
      test:
        - CMD
        - wget
        - "--quiet"
        - "--spider"
        - http://127.0.0.1:30054/api/healthcheck
      timeout: 5s
    image: ghcr.io/gethomepage/homepage:v1.8.0
    platform: linux/amd64
    ports:
      - mode: ingress
        protocol: tcp
        published: 30054
        target: 30054
    privileged: False
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    stdin_open: False
    tty: False
    user: "568:568"
    volumes:
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /mnt/main/homelab/services/homepage
        target: /app/config
        type: bind
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: True
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        type: bind
volumes: {}
x-notes: >
  # Homepage
  A self-hosted personal homepage/dashboard with various widgets and integrations.
x-portals:
  - host: homepage.punsvik.net
    name: Web UI
    path: /
    port: 443
    scheme: https
