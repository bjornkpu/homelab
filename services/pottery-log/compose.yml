services:
  pottery-log:
    container_name: pottery-log
    image: ghcr.io/bjornkpu/pottery-log:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pottery-log.rule=Host(`pottery.furuknappen.no`)"
      - "traefik.http.routers.pottery-log.entrypoints=websecure"
      - "traefik.http.routers.pottery-log.tls.certresolver=le"
      - "traefik.http.routers.pottery-log.middlewares=security-headers@file"
      - "traefik.http.services.pottery-log.loadbalancer.server.port=3000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      retries: 3
      timeout: 5s
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: traefik
