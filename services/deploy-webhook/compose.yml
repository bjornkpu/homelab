# deploy-webhook - Auto-deploy TrueNAS apps via GitHub Actions webhook
# https://github.com/adnanh/webhook
#
# First-run:
#   1. Copy .env.example → .env, fill in secrets
#   2. docker compose up -d

services:
  webhook:
    image: almir/webhook:2.8.3
    container_name: deploy-webhook
    restart: unless-stopped
    env_file: .env
    environment:
      - ALLOWED_APPS=${ALLOWED_APPS:-pottery-log}
    volumes:
      - ./hooks.json:/etc/webhook/hooks.json:ro
      - ./deploy.sh:/scripts/deploy.sh:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deploy-webhook.rule=Host(`deploy.punsvik.net`)"
      - "traefik.http.routers.deploy-webhook.entrypoints=websecure"
      - "traefik.http.routers.deploy-webhook.tls.certresolver=le"
      - "traefik.http.routers.deploy-webhook.middlewares=security-headers@file,webhook-rate-limit@docker"
      - "traefik.http.services.deploy-webhook.loadbalancer.server.port=9000"
      # Dedicated rate limit: 10 req/min, burst 3 (endpoint sees ~5 calls/day)
      - "traefik.http.middlewares.webhook-rate-limit.ratelimit.average=10"
      - "traefik.http.middlewares.webhook-rate-limit.ratelimit.burst=3"
      - "traefik.http.middlewares.webhook-rate-limit.ratelimit.period=1m"
    entrypoint: ["/bin/sh", "-c", "apk add -q --no-cache curl && exec webhook -hooks /etc/webhook/hooks.json -template -verbose"]
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000"]
      interval: 30s
      retries: 3
      timeout: 5s
      start_period: 10s
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: traefik
